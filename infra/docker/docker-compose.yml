version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bakery-erp-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-bakery_erp}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bakery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bakery-erp-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - bakery-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ../../apps/api-gateway
      dockerfile: ../../infra/docker/Dockerfile.api
    container_name: bakery-erp-api
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: bakery_erp
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bakery-network
    volumes:
      - ../../apps/api-gateway:/app
      - /app/node_modules

  web-client:
    build:
      context: ../../apps/web-client
      dockerfile: ../../infra/docker/Dockerfile.web
    container_name: bakery-erp-web
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - bakery-network

networks:
  bakery-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
